DISABLE_LINTERS:
  - TERRAFORM_TFLINT
  - TERRAFORM_TERRASCAN
  - TERRAFORM_TERRAFORM_FMT
  - TERRAFORM_TERRAGRUNT
  - REPOSITORY_CHECKOV
  - REPOSITORY_KICS
  - REPOSITORY_TRIVY
  - REPOSITORY_TRIVY_SBOM
  - REPOSITORY_SYFT
  - REPOSITORY_GRYPE
  - REPOSITORY_SECRETLINT
  - REPOSITORY_TRUFFLEHOG
  - SPELL_CSPELL
  - MARKDOWN_MARKDOWN_TABLE_FORMATTER
  - MARKDOWN_MARKDOWNLINT
  - COPYPASTE_JSCPD

# BookBuddy files are linted by the service's own workflow with its own config;
# excluding them here keeps mixed PRs to one lint per file.
FILTER_REGEX_EXCLUDE: "services/bookbuddy-web/.*"

ACTION_ACTIONLINT_ARGUMENTS: "-config-file .github/validation/actionlint.yaml"
REPOSITORY_GITLEAKS_RULES_PATH: ".github/validation"
REPOSITORY_GITLEAKS_CONFIG_FILE: ".gitleaks.toml"
KUBERNETES_KUBECONFORM_ARGUMENTS: "-ignore-missing-schemas"
YAML_YAMLLINT_ARGUMENTS: "--no-warnings"
# SealedSecret ciphertext lines cannot wrap; exempt them from line-length
YAML_YAMLLINT_FILTER_REGEX_EXCLUDE: "sealedsecret.*\\.yaml"

SPELL_LYCHEE_FILTER_REGEX_EXCLUDE: "(\\.github/|ansible/|kubernetes/|terraform/|services/|docs/rollout-runbook\\.md)"

SHOW_ELAPSED_TIME: true
FLAVOR_SUGGESTIONS: false
