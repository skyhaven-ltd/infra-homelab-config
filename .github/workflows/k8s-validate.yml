name: Validate

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/k8s-validate.yml"
      - "ansible/**"
      - "kubernetes/**"
      - "services/bookbuddy-web/scripts/**"
      - "terraform/**"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.14.8"
  KUSTOMIZE_VERSION: "5.8.1"
  KUSTOMIZE_SHA256: "029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d"
  KUBECONFORM_VERSION: "0.8.0"
  KUBECONFORM_SHA256: "9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883"
  ANSIBLE_LINT_VERSION: "26.6.0"

jobs:
  terraform:
    name: Terraform (${{ matrix.root }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        root:
          - cluster
          - runner
          - tailscale
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Format check
        env:
          ROOT: ${{ matrix.root }}
        run: terraform fmt -check -recursive "terraform/${ROOT}"

      - name: Terraform Init Without Backend
        env:
          ROOT: ${{ matrix.root }}
        run: terraform -chdir="terraform/${ROOT}" init -backend=false -input=false

      - name: Terraform Validate
        env:
          ROOT: ${{ matrix.root }}
        run: terraform -chdir="terraform/${ROOT}" validate

  kubernetes:
    name: Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install kustomize and kubeconform
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"

          curl -fsSLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          echo "${KUSTOMIZE_SHA256}  kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | sha256sum -c -
          tar -xzf "kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"

          curl -fsSLO "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  kubeconform-linux-amd64.tar.gz" | sha256sum -c -
          tar -xzf kubeconform-linux-amd64.tar.gz

          sudo install -m 0755 kustomize kubeconform /usr/local/bin/

      - name: Render and validate every kustomization
        env:
          CRD_SCHEMA: "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
        run: |
          set -euo pipefail
          rc=0
          while IFS= read -r dir; do
            echo "::group::${dir}"
            if ! kustomize build "${dir}" | kubeconform \
              -strict -summary -ignore-missing-schemas \
              -schema-location default -schema-location "${CRD_SCHEMA}"; then
              rc=1
            fi
            echo "::endgroup::"
          done < <(find kubernetes -name kustomization.yaml -printf '%h\n' | sort)
          exit "${rc}"

      - name: Validate Argo CD Applications
        env:
          CRD_SCHEMA: "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
        run: |
          set -euo pipefail
          kubeconform -strict -summary -ignore-missing-schemas \
            -schema-location default -schema-location "${CRD_SCHEMA}" \
            kubernetes/argocd-apps/*.yaml

  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install ansible-lint
        run: |
          set -euo pipefail
          python3 -m venv "${RUNNER_TEMP}/venv"
          "${RUNNER_TEMP}/venv/bin/pip" install --quiet --disable-pip-version-check \
            "ansible-lint==${ANSIBLE_LINT_VERSION}"
          echo "${RUNNER_TEMP}/venv/bin" >> "${GITHUB_PATH}"

      - name: Install collections
        working-directory: ansible
        run: ansible-galaxy install -r requirements.yml

      - name: Lint
        working-directory: ansible
        run: ansible-lint site.yml
