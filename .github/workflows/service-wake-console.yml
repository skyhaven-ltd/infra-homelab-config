---
name: Wake Console

on:
  pull_request:
    branches:
      - main
    paths:
      - "services/wake-console/**"
      - ".github/workflows/service-wake-console.yml"
  push:
    branches:
      - main
    paths:
      - "services/wake-console/**"
      - ".github/workflows/service-wake-console.yml"

permissions:
  contents: read

concurrency:
  group: wake-console-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_SHA: ghcr.io/${{ github.repository }}/wake-console:${{ github.sha }}
  IMAGE_LATEST: ghcr.io/${{ github.repository }}/wake-console:latest
  PYTHON_VERSION: "3.13.14"
  RUFF_VERSION: "0.12.5"

jobs:
  validate:
    name: Validate and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Linter
        working-directory: services/wake-console
        run: >-
          python -m pip install --disable-pip-version-check
          "ruff==${RUFF_VERSION}"

      - name: Lint and Format Check
        working-directory: services/wake-console
        run: |
          set -euo pipefail
          ruff format --check .
          ruff check .

      - name: Test
        working-directory: services/wake-console
        env:
          PYTHONPATH: src
        run: python -m unittest discover --start-directory tests --verbose

      - name: Build Container
        run: docker build --tag "${IMAGE_SHA}" services/wake-console

  publish:
    name: Publish Container
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Build Container
        run: >-
          docker build --tag "${IMAGE_SHA}" --tag "${IMAGE_LATEST}"
          services/wake-console

      - name: Login and Publish
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io \
            --username "${GITHUB_ACTOR}" --password-stdin
          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"
