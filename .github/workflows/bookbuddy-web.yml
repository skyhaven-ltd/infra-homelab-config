---
name: BookBuddy Web

on:
  pull_request:
    branches:
      - main
    paths:
      - "services/bookbuddy-web/**"
      - ".github/workflows/bookbuddy-web.yml"
  push:
    branches:
      - main
    paths:
      - "services/bookbuddy-web/**"
      - ".github/workflows/bookbuddy-web.yml"

permissions:
  contents: read

concurrency:
  group: bookbuddy-web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}/bookbuddy-web
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    if: github.event_name == 'pull_request'
    uses: skyhaven-ltd/pipeline-engineering-github-actions/.github/workflows/reusable-lint.yml@6cfa143b42ff464e4101d69c09945db9fac369e5
    with:
      flavor: python
      config_file: services/bookbuddy-web/.github/validation/.mega-linter.yml

  validate:
    name: Test and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/bookbuddy-web/requirements-dev.txt

      - name: Install Dependencies
        working-directory: services/bookbuddy-web
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Test
        working-directory: services/bookbuddy-web
        run: python -m pytest

      - name: Build Container
        run: docker build --tag "${IMAGE}:${GITHUB_SHA}" services/bookbuddy-web

  publish:
    name: Publish Container
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Build Container
        run: |
          set -euo pipefail
          docker build \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            --tag "${IMAGE}:latest" \
            services/bookbuddy-web

      - name: Login and Publish
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"
