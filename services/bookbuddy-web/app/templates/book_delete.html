{% extends "base.html" %}
{% block title %}Remove {{ book.title }} — BookBuddy{% endblock title %}
{% block content %}
  <section class="card">
    <h1>Remove {{ book.title }}?</h1>
    <p>
      This removes the imported chapters, questions and reading history for
      this book from BookBuddy.
    </p>
    <form action="{{ url_for('delete_book', book_id=book.id) }}" method="post" class="form-actions">
      <button type="submit" name="confirmation" value="remove">Remove book</button>
      <a class="button secondary" href="{{ url_for('book_detail', book_id=book.id) }}">Keep book</a>
    </form>
  </section>
{% endblock content %}
