# k3s version pin (§1.16) — current stable resolved 2026-07-05; recorded in docs/versions.md
k3s_version: "v1.36.2+k3s1"
appdata_device: /dev/sdb          # the 60G scsi1 disk (§0.3)
appdata_mount: /srv/appdata
# Media disk (930G ext4) moved from VM100 in Phase 9 as scsi2. Mounted by UUID
# (device letter is unstable) with nofail so a dead media disk can't hang boot (§1.12/§5).
media_mount: /mnt/media
media_fs_uuid: bc0c5059-f2ae-4c3a-9822-1781a090b2a8
node_ip: 192.168.1.4              # updated to .3 at cutover (Phase 11)
tailscale_authkey: "{{ lookup('env', 'TS_AUTHKEY') }}"   # one-time reusable key from admin console; never persisted to Git
