- hosts: all
  become: true
  roles:
    - { role: users, tags: [users] }

- hosts: k8s
  become: true
  roles:
    - { role: base, tags: [base] }
    - { role: tailscale, tags: [tailscale] }
    - { role: k3s, tags: [k3s] }
    - { role: argocd_bootstrap, tags: [argocd] }

- hosts: gha_runner
  become: true
  roles:
    - { role: gha_runner, tags: [gha_runner] }
