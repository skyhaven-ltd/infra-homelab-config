# Admin users + SSH access — every host (k8s node + Proxmox).
- hosts: all
  roles:
    - { role: users, tags: [users] }

# k3s cluster stack — k8s node only.
- hosts: k8s
  become: true
  roles:
    - { role: base, tags: [base] }
    - { role: tailscale, tags: [tailscale] }
    - { role: k3s, tags: [k3s] }
    - { role: argocd_bootstrap, tags: [argocd] }

# GitHub Actions runner — the LXC on the Proxmox host, outside the cluster. Its
# host lives in inventory/runner.yml (written by terraform/runner), so this play
# matches nothing when the default k8s inventory is used.
- hosts: gha_runner
  become: true
  roles:
    - { role: gha_runner, tags: [gha_runner] }
