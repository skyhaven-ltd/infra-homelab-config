# Admin users + SSH access — every host (k8s node + Proxmox).
- hosts: all
  roles:
    - { role: users, tags: [users] }

# k3s cluster stack — k8s node only.
- hosts: k8s
  become: true
  roles:
    - { role: base, tags: [base] }
    - { role: tailscale, tags: [tailscale] }
    - { role: k3s, tags: [k3s] }
    - { role: argocd_bootstrap, tags: [argocd] }
