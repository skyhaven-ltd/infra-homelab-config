- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ admin_user }}"
    comment: "{{ admin_user_comment }}"
    groups: "{{ admin_user_groups }}"
    append: true
    shell: /bin/bash
    create_home: true

- name: Set admin password (only when a hash is supplied)
  ansible.builtin.user:
    name: "{{ admin_user }}"
    password: "{{ admin_password_hash }}"
  when: admin_password_hash | length > 0
  no_log: true

- name: Install authorized SSH keys
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ lookup('file', item) }}"
    state: present
    exclusive: false
  with_fileglob:
    - "authorized_keys.d/*.pub"

- name: Configure SSH auth methods
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/00-homelab-auth.conf
    content: |
      PubkeyAuthentication yes
      PasswordAuthentication {{ 'yes' if ssh_password_authentication else 'no' }}
    mode: "0644"
  notify: restart ssh
