---
# k3s server kubeconfig on the node (root-readable via become).
argocd_kubeconfig: /etc/rancher/k3s/k3s.yaml
# Path (on the Ansible controller) to the Argo CD repo deploy private key.
# Empty by default — only set for the first bootstrap that creates the repo secret.
# Never commit the key. Passed via `make bootstrap ARGOCD_REPO_KEY=/path/to/key`.
argocd_repo_key_path: ""
