# Phase 5 — Argo CD bootstrap (idempotent). Runs on the k3s node; kubectl uses the
# k3s kubeconfig. Wraps plan Steps 1 & 3 so a clean rebuild is `make bootstrap`
# end-to-end. No repo secret: infra-homelab-config is a PUBLIC repo, so Argo CD pulls
# it anonymously over HTTPS (SealedSecrets ciphertext is safe to publish by design).
- name: Stage Argo CD bootstrap manifests on the node
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../kubernetes/bootstrap/argocd/"
    dest: /var/lib/rancher/k3s-bootstrap/argocd/
    mode: "0644"

- name: Check whether Argo CD is already installed
  ansible.builtin.command: kubectl get deployment argocd-server -n argocd
  environment: { KUBECONFIG: "{{ argocd_kubeconfig }}" }
  register: argocd_deploy
  changed_when: false
  failed_when: false

- name: Install Argo CD (namespace + pinned install.yaml via kustomize)
  ansible.builtin.command: kubectl apply -k /var/lib/rancher/k3s-bootstrap/argocd/
  environment: { KUBECONFIG: "{{ argocd_kubeconfig }}" }
  when: argocd_deploy.rc != 0
  register: argocd_apply
  changed_when: "'created' in argocd_apply.stdout or 'configured' in argocd_apply.stdout"

- name: Wait for argocd-server to become available
  ansible.builtin.command: >-
    kubectl -n argocd wait --for=condition=Available deployment/argocd-server --timeout=180s
  environment: { KUBECONFIG: "{{ argocd_kubeconfig }}" }
  changed_when: false

- name: Apply the app-of-apps root Application
  ansible.builtin.command: kubectl apply -f -
  args:
    stdin: "{{ lookup('file', playbook_dir + '/../kubernetes/argocd-apps/root-app.yaml') }}"
  environment: { KUBECONFIG: "{{ argocd_kubeconfig }}" }
  register: root_apply
  changed_when: "'created' in root_apply.stdout or 'configured' in root_apply.stdout"
