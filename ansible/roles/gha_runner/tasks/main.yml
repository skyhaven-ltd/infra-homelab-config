---
- name: Install runner packages
  ansible.builtin.apt:
    name: "{{ gha_runner_packages }}"
    update_cache: true

- name: Add the Azure CLI apt repository and signing key
  ansible.builtin.deb822_repository:
    name: azure-cli
    types: [deb]
    uris: "https://packages.microsoft.com/repos/azure-cli/"
    suites: ["{{ ansible_distribution_release }}"]
    components: [main]
    architectures: [amd64]
    signed_by: "https://packages.microsoft.com/keys/microsoft.asc"
    state: present
  register: gha_runner_azure_cli_repo

- name: Install the Azure CLI
  ansible.builtin.apt:
    name: azure-cli
    update_cache: "{{ gha_runner_azure_cli_repo is changed }}"

- name: Ensure the runner group exists
  ansible.builtin.group:
    name: "{{ gha_runner_group }}"
    system: true

- name: Ensure the runner service account exists
  ansible.builtin.user:
    name: "{{ gha_runner_user }}"
    group: "{{ gha_runner_group }}"
    home: "{{ gha_runner_home }}"
    shell: /bin/bash
    system: true
    create_home: false

- name: Ensure the runner directory exists
  ansible.builtin.file:
    path: "{{ gha_runner_home }}"
    state: directory
    owner: "{{ gha_runner_user }}"
    group: "{{ gha_runner_group }}"
    mode: "0750"

- name: Download the actions/runner release
  ansible.builtin.get_url:
    url: >-
      https://github.com/actions/runner/releases/download/v{{ gha_runner_version }}/actions-runner-linux-x64-{{ gha_runner_version }}.tar.gz
    dest: "/tmp/actions-runner-{{ gha_runner_version }}.tar.gz"
    checksum: "sha256:{{ gha_runner_sha256 }}"
    mode: "0644"

- name: Unpack the runner
  ansible.builtin.unarchive:
    src: "/tmp/actions-runner-{{ gha_runner_version }}.tar.gz"
    dest: "{{ gha_runner_home }}"
    remote_src: true
    owner: "{{ gha_runner_user }}"
    group: "{{ gha_runner_group }}"
    creates: "{{ gha_runner_home }}/config.sh"

- name: Install runner OS dependencies
  ansible.builtin.command: ./bin/installdependencies.sh
  args:
    chdir: "{{ gha_runner_home }}"
    creates: "{{ gha_runner_home }}/.dependencies-installed"
  register: gha_runner_deps
  changed_when: true

- name: Mark OS dependencies as installed
  ansible.builtin.file:
    path: "{{ gha_runner_home }}/.dependencies-installed"
    state: touch
    owner: "{{ gha_runner_user }}"
    group: "{{ gha_runner_group }}"
    mode: "0644"
  when: gha_runner_deps is changed

- name: Check whether the runner is already registered
  ansible.builtin.stat:
    path: "{{ gha_runner_home }}/.runner"
  register: gha_runner_registered

- name: Require a registration token when registering for the first time
  ansible.builtin.assert:
    that:
      - gha_runner_registration_token | length > 0
    fail_msg: >-
      No registration token. Mint a short-lived one and re-run:
      GHA_RUNNER_TOKEN="$(gh api --method POST
      repos/skyhaven-ltd/infra-homelab-config/actions/runners/registration-token
      --jq .token)" make runner-configure
  when: not gha_runner_registered.stat.exists

- name: Register the runner with GitHub
  ansible.builtin.command:
    argv:
      - ./config.sh
      - --unattended
      - --replace
      - --url
      - "{{ gha_runner_repo_url }}"
      - --token
      - "{{ gha_runner_registration_token }}"
      - --name
      - "{{ gha_runner_name }}"
      - --labels
      - "{{ gha_runner_labels }}"
      - --work
      - _work
    chdir: "{{ gha_runner_home }}"
  become: true
  become_user: "{{ gha_runner_user }}"
  when: not gha_runner_registered.stat.exists
  changed_when: true
  no_log: true

- name: Install the runner systemd service
  ansible.builtin.command: ./svc.sh install {{ gha_runner_user }}
  args:
    chdir: "{{ gha_runner_home }}"
    creates: "{{ gha_runner_home }}/.service"
  changed_when: true

- name: Read the generated systemd unit name
  ansible.builtin.slurp:
    src: "{{ gha_runner_home }}/.service"
  register: gha_runner_unit_file

- name: Resolve the unit name
  ansible.builtin.set_fact:
    gha_runner_unit: "{{ (gha_runner_unit_file.content | b64decode) | trim }}"

- name: Ensure the systemd drop-in directory exists
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ gha_runner_unit }}.d"
    state: directory
    mode: "0755"

- name: Always restart the runner
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ gha_runner_unit }}.d/10-restart.conf"
    content: |
      [Service]
      Restart=always
      RestartSec=5
    mode: "0644"
  notify: restart gha runner

- name: Ensure the runner service is enabled and running
  ansible.builtin.systemd:
    name: "{{ gha_runner_unit }}"
    state: started
    enabled: true
    daemon_reload: true
