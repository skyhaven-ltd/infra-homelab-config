apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: radarr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/skyhaven-ltd/infra-homelab-config.git
    targetRevision: major/kubernetes
    path: kubernetes/apps/radarr
  destination:
    server: https://kubernetes.default.svc
    namespace: radarr
  # Phase 9 Step 4: live — media disk moved + data seeded.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
