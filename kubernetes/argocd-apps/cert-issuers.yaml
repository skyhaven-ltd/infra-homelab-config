apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-issuers
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # after cert-manager CRDs (wave -2) exist
spec:
  project: default
  source:
    repoURL: https://github.com/skyhaven-ltd/infra-homelab-config.git
    targetRevision: major/kubernetes
    path: kubernetes/infrastructure/cert-issuers
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
