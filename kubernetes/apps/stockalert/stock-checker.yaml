apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stockalert-data
  namespace: stockalert
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-checker
  namespace: stockalert
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stock-checker
  template:
    metadata:
      labels:
        app: stock-checker
    spec:
      # App spawns headless Chrome per check; python runs as PID 1 and never
      # reaps exited children. Shared PID namespace makes the pause container
      # PID 1 so it reaps the zombies.
      shareProcessNamespace: true
      containers:
        - name: stock-checker
          image: ghcr.io/skyhaven-ltd/infra-homelab-config/stockalert-monitor@sha256:1ac21001291269144513ae1dd89a4725a0ebc4b8b4923bb439c2f472968d2a3c
          envFrom:
            - secretRef:
                name: stockalert-env
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: config
              mountPath: /app/products.txt
              subPath: products.txt
              readOnly: true
            - { name: data, mountPath: /app/data }
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            # Chrome's working set does not fit in 512Mi; the cgroup evicts
            # file-backed pages and re-reads them from disk on every launch,
            # tripping NodeMemoryMajorPagesFaults.
            limits: { memory: 1Gi }
      volumes:
        - name: config
          configMap:
            name: stockalert-config
        - name: data
          persistentVolumeClaim:
            claimName: stockalert-data
