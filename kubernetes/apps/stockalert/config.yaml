settings:
  interval_seconds: 60
  request_timeout: 30.0
  products_file: products.txt
  database_path: data/stock.db
  log_level: INFO
  log_file: data/stock-alert.log
  flaresolverr_url: http://flaresolverr:8191/v1

notifiers:
  ntfy:
    enabled: true
    server: ${NTFY_SERVER}
    topic: ${NTFY_TOPIC}
    token: ${NTFY_TOKEN}
    priority: 5
    tags: ["rotating_light"]

  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
