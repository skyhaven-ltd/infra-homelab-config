apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-cache
  namespace: stockalert
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: stockalert
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy@sha256:cfbbb1bac9196cb711e29ef0ac4adaeb033be6235f1df857705dc39c14384a1d
          args: [serve]
          env:
            - { name: NTFY_BASE_URL, value: "http://192.168.1.3:8090" }
            - { name: NTFY_UPSTREAM_BASE_URL, value: "https://ntfy.sh" }
            - { name: NTFY_LISTEN_HTTP, value: ":80" }
          ports:
            - { name: http, containerPort: 80 }
          volumeMounts:
            - { name: cache, mountPath: /var/cache/ntfy }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { memory: 128Mi }
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: ntfy-cache
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: stockalert
spec:
  selector:
    app: ntfy
  ports:
    - { name: http, port: 80, targetPort: 80 }
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy-lb
  namespace: stockalert
spec:
  type: LoadBalancer
  selector:
    app: ntfy
  ports:
    - { name: http, port: 8090, targetPort: 80 }
