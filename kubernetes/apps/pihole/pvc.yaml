apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-etc
  namespace: pihole
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      # ~320M seeded today (dominated by pihole-FTL.db query history); local-path
      # does not enforce capacity, so this is nominal headroom for FTL db growth.
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-dnsmasq
  namespace: pihole
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 256Mi
