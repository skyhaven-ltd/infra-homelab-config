apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: qbittorrent
spec:
  # ClusterIP for the web UI (fronted by Ingress).
  selector:
    app: qbittorrent
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-bt
  namespace: qbittorrent
spec:
  # Raw BitTorrent port on the node IP. klipper binds only 6881 tcp/udp —
  # no clash with 80/443 (ingress), 53 (pihole), 8090 (ntfy).
  type: LoadBalancer
  selector:
    app: qbittorrent
  ports:
    - { name: bt-tcp, port: 6881, targetPort: 6881, protocol: TCP }
    - { name: bt-udp, port: 6881, targetPort: 6881, protocol: UDP }
