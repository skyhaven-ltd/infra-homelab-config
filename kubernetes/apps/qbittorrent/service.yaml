apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: qbittorrent
spec:
  selector:
    app: qbittorrent
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-bt
  namespace: qbittorrent
spec:
  type: LoadBalancer
  selector:
    app: qbittorrent
  ports:
    - { name: bt-tcp, port: 6881, targetPort: 6881, protocol: TCP }
    - { name: bt-udp, port: 6881, targetPort: 6881, protocol: UDP }
