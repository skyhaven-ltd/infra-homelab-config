---
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildarr-config
  namespace: buildarr
data:
  # Rendered to /config/buildarr.yml at container start. ${VAR} placeholders are
  # substituted from the buildarr-secrets env (buildarr has no native env interpolation).
  entrypoint.sh: |
    #!/bin/sh
    set -eu
    python3 -c "import os, string, pathlib; \
      pathlib.Path('/config/buildarr.yml').write_text( \
      string.Template(pathlib.Path('/etc/buildarr/buildarr.yml.tmpl').read_text()).substitute(os.environ))"
    exec buildarr daemon /config/buildarr.yml
  buildarr.yml.tmpl: |
    ---
    buildarr:
      watch_config: false
      update_days:
        - "monday"
        - "tuesday"
        - "wednesday"
        - "thursday"
        - "friday"
        - "saturday"
        - "sunday"
      update_times:
        - "04:30"

    prowlarr:
      hostname: "prowlarr.prowlarr.svc.cluster.local"
      port: 9696
      protocol: "http"
      api_key: "${PROWLARR_API_KEY}"
      settings:
        apps:
          sync_profiles:
            delete_unmanaged: false
            definitions:
              "Standard":
                enable_automatic_search: true
                enable_interactive_search: true
                enable_rss: true
                minimum_seeders: 1
          applications:
            # false: never delete app links Buildarr does not manage (e.g. UI-created).
            delete_unmanaged: false
            definitions:
              "Sonarr":
                type: "sonarr"
                api_key: "${SONARR_API_KEY}"
                prowlarr_url: "http://prowlarr.prowlarr.svc.cluster.local:9696"
                base_url: "http://sonarr.sonarr.svc.cluster.local:8989"
                sync_level: "full-sync"
                sync_categories:
                  - "TV"
                  - "TV/Foreign"
                  - "TV/SD"
                  - "TV/HD"
                  - "TV/UHD"
                  - "TV/Other"
                  - "TV/Anime"
              "Radarr":
                type: "radarr"
                api_key: "${RADARR_API_KEY}"
                prowlarr_url: "http://prowlarr.prowlarr.svc.cluster.local:9696"
                base_url: "http://radarr.radarr.svc.cluster.local:7878"
                sync_level: "full-sync"
                sync_categories:
                  - "Movies"
                  - "Movies/Foreign"
                  - "Movies/Other"
                  - "Movies/SD"
                  - "Movies/HD"
                  - "Movies/UHD"
                  - "Movies/BluRay"
                  - "Movies/3D"
                  - "Movies/DVD"
                  - "Movies/WEB-DL"
        indexers:
          proxies:
            delete_unmanaged: false
            definitions:
              "FlareSolverr":
                type: "flaresolverr"
                host_url: "http://flaresolverr.prowlarr.svc.cluster.local:8191/"
                request_timeout: 60
          indexers:
            # delete_unmanaged false keeps hand-added indexers; set true to make
            # this file the sole source of truth for Prowlarr indexers.
            delete_unmanaged: false
            definitions:
              "1337x":
                type: "1337x"
                enable: true
                sync_profile: "Standard"
                priority: 25
              "The Pirate Bay":
                type: "thepiratebay"
                enable: true
                sync_profile: "Standard"
                priority: 25
              "TorrentGalaxy":
                type: "torrentgalaxy"
                enable: true
                sync_profile: "Standard"
                priority: 25
              "LimeTorrents":
                type: "limetorrents"
                enable: true
                sync_profile: "Standard"
                priority: 30
              "EZTV":
                type: "eztv"
                enable: true
                sync_profile: "Standard"
                priority: 25
              "YTS":
                type: "yts"
                enable: true
                sync_profile: "Standard"
                priority: 30
              "Nyaa.si":
                type: "nyaasi"
                enable: true
                sync_profile: "Standard"
                priority: 25
