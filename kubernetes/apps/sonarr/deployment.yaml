apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: sonarr
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO config volume
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          # Pinned by digest = old container's exact running :latest image (§1.11).
          image: lscr.io/linuxserver/sonarr@sha256:02b4d538d351d6e35882a021c08e8600fe95d28860fb1dd724b597166e7221ca
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ, value: "Etc/UTC" }
          ports:
            - { name: http, containerPort: 8989 }
          volumeMounts:
            - { name: config, mountPath: /config }
            # Compose /mnt/media:/data (rw) — arrs write imports/hardlinks here.
            # Identical container path preserves *arr path mappings + hardlinks (§1.11).
            - { name: media, mountPath: /data }
          readinessProbe:
            httpGet: { path: /ping, port: 8989 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: media
          hostPath: { path: /mnt/media, type: Directory }
