apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: learning-review
  namespace: learning-review
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: nginx
  tls:
    - hosts: [learning.lab.skyhaven.ltd]
      secretName: learning-review-tls
  rules:
    - host: learning.lab.skyhaven.ltd
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: learning-review
                port:
                  number: 8080
