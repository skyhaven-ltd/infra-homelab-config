apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-review
  namespace: learning-review
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: learning-review
  template:
    metadata:
      labels:
        app: learning-review
    spec:
      containers:
        - name: app
          image: ghcr.io/skyhaven-ltd/app-learning-review@sha256:ce2944ad179eebc60bd8c149688304199b42a7c6833708f80f419aed6f812bb1
          envFrom:
            - secretRef:
                name: learning-review-env
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: learning-data, mountPath: /data }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: learning-data
          persistentVolumeClaim:
            claimName: learning-data
