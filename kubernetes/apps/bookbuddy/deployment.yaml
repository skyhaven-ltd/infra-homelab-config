apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookbuddy
  namespace: bookbuddy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bookbuddy
  template:
    metadata:
      labels:
        app: bookbuddy
    spec:
      containers:
        - name: app
          image: ghcr.io/skyhaven-ltd/infra-homelab-config/bookbuddy-web@sha256:c15df11ef9ea6d58d0b877b0044d929eb36a9bbf45890dffb9f38c65fae23319
          command: ["uvicorn"]
          args:
            - app.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - --proxy-headers
            - --forwarded-allow-ips
            - "*"
          env:
            - { name: DATABASE_URL, value: "sqlite:////data/bookbuddy.db" }
            - { name: UPLOAD_DIR, value: "/data/uploads" }
          envFrom:
            - secretRef:
                name: bookbuddy-env
                optional: true
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: bookbuddy-data, mountPath: /data }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: bookbuddy-data
          persistentVolumeClaim:
            claimName: bookbuddy-data
