apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-config
  namespace: audiobookshelf
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      # Old /config ~1.1M; nominal headroom.
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-metadata
  namespace: audiobookshelf
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      # /metadata holds covers/cache; grows with library.
      storage: 5Gi
